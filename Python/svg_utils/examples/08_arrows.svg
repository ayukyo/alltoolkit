<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <title>Arrows Example</title>
  <defs>
    <marker id="arrowRed" refX="10" refY="5.0" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="0,0 10,5.0 0,10" fill="#e74c3c" stroke="none" stroke-width="1" />
    </marker>
    <marker id="arrowBlue" refX="10" refY="5.0" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="0,0 10,5.0 0,10" fill="#3498db" stroke="none" stroke-width="1" />
    </marker>
    <marker id="arrowGreen" refX="10" refY="5.0" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="0,0 10,5.0 0,10" fill="#2ecc71" stroke="none" stroke-width="1" />
    </marker>
  </defs>
  <line x1="50" y1="50" x2="350" y2="50" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowRed)" />
  <line x1="200" y1="70" x2="200" y2="180" stroke="#3498db" stroke-width="3" marker-end="url(#arrowBlue)" />
  <line x1="50" y1="150" x2="150" y2="100" stroke="#2ecc71" stroke-width="3" marker-end="url(#arrowGreen)" />
  <line x1="250" y1="100" x2="350" y2="150" stroke="#2ecc71" stroke-width="3" marker-end="url(#arrowGreen)" />
  <text x="50" y="40" font-size="12" font-family="Arial" fill="black" text-anchor="start">Horizontal</text>
  <text x="210" y="80" font-size="12" font-family="Arial" fill="black" text-anchor="start">Vertical</text>
  <text x="70" y="180" font-size="12" font-family="Arial" fill="black" text-anchor="start">Diagonals</text>
</svg>