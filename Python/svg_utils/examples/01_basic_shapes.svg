<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <title>Basic Shapes Example</title>
  <desc>Demonstrates rectangles, circles, ellipses, and lines</desc>
  <rect x="0" y="0" width="300" height="200" fill="#f8f9fa" stroke="none" stroke-width="1" />
  <rect x="20" y="20" width="80" height="60" fill="#3498db" stroke="none" stroke-width="1" rx="10" ry="10" />
  <circle cx="170" cy="50" r="30" fill="#e74c3c" stroke="none" stroke-width="1" />
  <ellipse cx="260" cy="50" rx="30" ry="20" fill="#2ecc71" stroke="none" stroke-width="1" />
  <line x1="20" y1="100" x2="280" y2="100" stroke="#34495e" stroke-width="3" />
  <polygon points="50,180 100,120 150,180" fill="#9b59b6" stroke="none" stroke-width="1" />
  <polyline points="180,180 200,140 220,180 240,140 260,180" fill="none" stroke="#e67e22" stroke-width="3" />
  <text x="150" y="20" font-size="14" font-family="Arial" fill="#2c3e50" text-anchor="start">Basic Shapes</text>
</svg>