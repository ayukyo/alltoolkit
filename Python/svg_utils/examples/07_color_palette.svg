<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <title>Color Palette Example</title>
  <rect x="20" y="30" width="60" height="40" fill="#ff6b6b" stroke="none" stroke-width="1" />
  <rect x="20" y="80" width="60" height="40" fill="#ff9797" stroke="none" stroke-width="1" />
  <rect x="20" y="130" width="60" height="40" fill="#b24a4a" stroke="none" stroke-width="1" />
  <text x="50" y="25" font-size="8" font-family="Arial" fill="black" text-anchor="middle">#ff6b6b</text>
  <text x="50" y="185" font-size="7" font-family="Arial" fill="black" text-anchor="middle">RGB: (255, 107, 107)</text>
  <rect x="100" y="30" width="60" height="40" fill="#4ecdc4" stroke="none" stroke-width="1" />
  <rect x="100" y="80" width="60" height="40" fill="#83dcd5" stroke="none" stroke-width="1" />
  <rect x="100" y="130" width="60" height="40" fill="#368f89" stroke="none" stroke-width="1" />
  <text x="130" y="25" font-size="8" font-family="Arial" fill="black" text-anchor="middle">#4ecdc4</text>
  <text x="130" y="185" font-size="7" font-family="Arial" fill="black" text-anchor="middle">RGB: (78, 205, 196)</text>
  <rect x="180" y="30" width="60" height="40" fill="#45b7d1" stroke="none" stroke-width="1" />
  <rect x="180" y="80" width="60" height="40" fill="#7cccde" stroke="none" stroke-width="1" />
  <rect x="180" y="130" width="60" height="40" fill="#308092" stroke="none" stroke-width="1" />
  <text x="210" y="25" font-size="8" font-family="Arial" fill="black" text-anchor="middle">#45b7d1</text>
  <text x="210" y="185" font-size="7" font-family="Arial" fill="black" text-anchor="middle">RGB: (69, 183, 209)</text>
  <rect x="260" y="30" width="60" height="40" fill="#96ceb4" stroke="none" stroke-width="1" />
  <rect x="260" y="80" width="60" height="40" fill="#b5dcca" stroke="none" stroke-width="1" />
  <rect x="260" y="130" width="60" height="40" fill="#69907d" stroke="none" stroke-width="1" />
  <text x="290" y="25" font-size="8" font-family="Arial" fill="black" text-anchor="middle">#96ceb4</text>
  <text x="290" y="185" font-size="7" font-family="Arial" fill="black" text-anchor="middle">RGB: (150, 206, 180)</text>
  <rect x="340" y="30" width="60" height="40" fill="#ffeaa7" stroke="none" stroke-width="1" />
  <rect x="340" y="80" width="60" height="40" fill="#fff0c1" stroke="none" stroke-width="1" />
  <rect x="340" y="130" width="60" height="40" fill="#b2a374" stroke="none" stroke-width="1" />
  <text x="370" y="25" font-size="8" font-family="Arial" fill="black" text-anchor="middle">#ffeaa7</text>
  <text x="370" y="185" font-size="7" font-family="Arial" fill="black" text-anchor="middle">RGB: (255, 234, 167)</text>
  <text x="30" y="220" font-size="10" font-family="Arial" fill="black" text-anchor="start">Top: Original | Middle: Lightened | Bottom: Darkened</text>
</svg>