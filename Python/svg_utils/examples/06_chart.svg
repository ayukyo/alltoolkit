<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <title>Bar Chart Example</title>
  <rect x="0" y="0" width="400" height="250" fill="#fafafa" stroke="none" stroke-width="1" />
  <line x1="60" y1="50" x2="60" y2="200" stroke="#333" stroke-width="2" />
  <line x1="60" y1="200" x2="380" y2="200" stroke="#333" stroke-width="2" />
  <line x1="60" y1="170" x2="380" y2="170" stroke="#e0e0e0" stroke-width="1" />
  <text x="50" y="175" font-size="10" font-family="Arial" fill="black" text-anchor="end">20</text>
  <line x1="60" y1="140" x2="380" y2="140" stroke="#e0e0e0" stroke-width="1" />
  <text x="50" y="145" font-size="10" font-family="Arial" fill="black" text-anchor="end">40</text>
  <line x1="60" y1="110" x2="380" y2="110" stroke="#e0e0e0" stroke-width="1" />
  <text x="50" y="115" font-size="10" font-family="Arial" fill="black" text-anchor="end">60</text>
  <line x1="60" y1="80" x2="380" y2="80" stroke="#e0e0e0" stroke-width="1" />
  <text x="50" y="85" font-size="10" font-family="Arial" fill="black" text-anchor="end">80</text>
  <line x1="60" y1="50" x2="380" y2="50" stroke="#e0e0e0" stroke-width="1" />
  <text x="50" y="55" font-size="10" font-family="Arial" fill="black" text-anchor="end">100</text>
  <rect x="75" y="102.5" width="40" height="97.5" fill="#3498db" stroke="none" stroke-width="1" />
  <text x="95.0" y="215" font-size="10" font-family="Arial" fill="black" text-anchor="middle">Jan</text>
  <rect x="130" y="140.0" width="40" height="60.0" fill="#2ecc71" stroke="none" stroke-width="1" />
  <text x="150.0" y="215" font-size="10" font-family="Arial" fill="black" text-anchor="middle">Feb</text>
  <rect x="185" y="80.0" width="40" height="120.0" fill="#e74c3c" stroke="none" stroke-width="1" />
  <text x="205.0" y="215" font-size="10" font-family="Arial" fill="black" text-anchor="middle">Mar</text>
  <rect x="240" y="117.5" width="40" height="82.5" fill="#f39c12" stroke="none" stroke-width="1" />
  <text x="260.0" y="215" font-size="10" font-family="Arial" fill="black" text-anchor="middle">Apr</text>
  <rect x="295" y="65.0" width="40" height="135.0" fill="#9b59b6" stroke="none" stroke-width="1" />
  <text x="315.0" y="215" font-size="10" font-family="Arial" fill="black" text-anchor="middle">May</text>
  <rect x="350" y="95.0" width="40" height="105.0" fill="#1abc9c" stroke="none" stroke-width="1" />
  <text x="370.0" y="215" font-size="10" font-family="Arial" fill="black" text-anchor="middle">Jun</text>
  <text x="200" y="30" font-size="16" font-family="Arial" fill="#333" text-anchor="middle">Monthly Sales</text>
</svg>